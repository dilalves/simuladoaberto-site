<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/x-icon" href="https://www.curso-objetivo.br/assets/img/favicon.ico" />
  <title>Resultado - Simulado Fuvestão Maio 2026</title>

  <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet">
  <style>
    /*     cd C:\3A_SISTEMAS_SIMULADOABERTO\simuladoaberto-site */
    header {
      margin:0;
      padding:20px 0;
      background:#002776;
      color:#fff;
      text-align:center;
    }
    body { background:#fafafa; }
    h1 { margin:0; font-size:24px; }
    footer { text-align:center; padding:20px; font-size:14px; color:#adb7ee; }
    .brand { color:#002776; font-weight:600; }
    table.striped th { color:#002776; }
    .acerto { background:#a8d7f7; }
    .erro {
      background:#a8d7f7;
      border-left:4px solid #002776;
    }
    .btn { border-radius:6px; }
    .card { border-radius:10px; }
    #btnTopo {
      position:fixed;
      right:20px;
      bottom:20px;
      background:#002776;
      color:#fff;
      border:none;
      border-radius:50%;
      width:46px;
      height:46px;
      font-size:22px;
      cursor:pointer;
      box-shadow:0 2px 6px rgba(0,0,0,0.3);
      display:none;
    }
    #btnTopo:hover {
      background:#0b49a5;
    }

    /* --- Ajuste final do modal de resolução --- */
    .modal {
      top: 2vh !important;
      max-height: 96vh !important;
      overflow: visible !important;
    }

    .modal.open {
      overflow: visible !important;
    }

    .modal .modal-content {
      max-height: none !important;
      overflow: visible !important;
      padding: 0 !important;
      margin: 0 !important;
    }

    .modal .modal-footer {
      position: sticky;
      bottom: 0;
      background: #fff;
      border-top: 1px solid #eee;
      padding-right: 20px !important;
    }


    /* === Gráficos estilo Fuvest (distribuição) === */
    .graficos-posicao {
      margin: 28px auto 10px;
      max-width: 1000px;
    }

    .grafico-posicao-card {
      border: 1px solid #dbe5f2;
      border-radius: 12px;
      overflow: hidden;
      background: #f5f8fd;
      margin-bottom: 22px;
      box-shadow: 0 1px 4px rgba(0, 39, 118, 0.08);
    }

    .grafico-posicao-topo {
      background: linear-gradient(90deg, #002776, #1A4F8B, #2f6fb1);
      color: #fff;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 15px;
    }

    .grafico-posicao-topo h6 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: .2px;
    }

    .grafico-posicao-topo p {
      margin: 3px 0 0;
      font-size: 13px;
      opacity: .95;
    }

    .badge-pontos {
      min-width: 66px;
      height: 66px;
      border-radius: 50%;
      background: #f5c400;
      color: #002776;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      box-shadow: inset 0 0 0 4px rgba(255,255,255,.25);
      line-height: 1;
    }

    .badge-pontos strong {
      font-size: 25px;
      line-height: 24px;
    }

    .badge-pontos span {
      font-size: 11px;
      margin-top: 2px;
    }

    .grafico-posicao-corpo {
      display: grid;
      grid-template-columns: 210px 1fr;
      gap: 18px;
      padding: 18px;
      align-items: center;
    }

    .grafico-posicao-texto {
      color: #002776;
      font-size: 17px;
      line-height: 1.35;
      font-weight: 700;
    }

    .grafico-posicao-canvas-wrap {
      width: 100%;
      min-height: 230px;
    }

    .grafico-posicao-canvas-wrap canvas {
      width: 100% !important;
      height: 250px !important;
    }

    #chartWrapDistribuicao {
      width: 100%;
    }


/* -----------  MOBILE FIRST (celular) ----------- */
@media (max-width: 480px) {
  body { background:#fafafa; }

  h1 { font-size:18px; }

  .container { padding:0 10px; }

  .card {
    padding:14px !important;
    margin-bottom:15px;
  }

  .btn {
    width:100%;
    margin-top:6px;
  }

  #dadosAluno {
    padding:14px !important;
    font-size:14px;
  }

  /* === Gráfico === */
  #chartWrap {
    width:100%;
    overflow-x:auto;
    overflow-y:hidden;
    -webkit-overflow-scrolling:touch;
    border-radius:6px;
    background:#fff;
    padding:10px 0;
  }
  #chartWrap canvas {
    min-width:800px; /* largura mínima para não cortar disciplinas */
    height:auto !important;
    display:block;
  }


  #chartWrapDistribuicao {
    overflow-x:auto;
    overflow-y:hidden;
    -webkit-overflow-scrolling:touch;
  }

  .graficos-posicao {
    margin-top: 20px;
  }

  .grafico-posicao-topo {
    padding: 12px 14px;
  }

  .grafico-posicao-topo h6 {
    font-size: 15px;
  }

  .grafico-posicao-topo p {
    font-size: 12px;
  }

  .badge-pontos {
    min-width: 54px;
    height: 54px;
  }

  .badge-pontos strong {
    font-size: 21px;
  }

  .grafico-posicao-corpo {
    grid-template-columns: 1fr;
    gap: 8px;
    padding: 14px;
  }

  .grafico-posicao-texto {
    font-size: 14px;
  }

  .grafico-posicao-canvas-wrap canvas {
    min-width: 760px;
    height: 240px !important;
  }


  /* === Tabela de questões === */
  .tabelaWrap {
    overflow-x:auto;
    white-space:nowrap;
  }

  table.striped {
    font-size:12px;
    border-collapse:separate;
    border-spacing:0 4px;
    min-width:600px;
  }

  table.striped th,
  table.striped td {
    text-align:center;
    padding:6px 8px;
  }

  .acerto {
    background:#e8f5e9;
    color:#1b5e20;
    font-weight:600;
  }

  .erro {
    background:#ffebee;
    color:#b71c1c;
    font-weight:600;
  }

  #btnTopo {
    width:40px;
    height:40px;
    font-size:18px;
  }
}


  /* -----------  TABLET (entre 481 e 768px) ----------- */
  @media (min-width: 481px) and (max-width: 768px) {
    h1 {
      font-size:20px;
    }
    .container {
      padding:0 20px;
    }
    .btn {
      width:auto;
    }
    table.striped {
      font-size:13px;
    }
  }

  /* versão desktop: aviso oculto */
  #avisoMobile {
    display: none;
    background: #fff3cd;
    border: 1px solid #ffeeba;
    color: #856404;
    padding: 14px;
    border-radius: 8px;
    font-size: 14px;
    margin-top: 16px;
    text-align: center;
  }

  </style>
</head>

<body>
  <header>
    <h1>Simulado Aberto Fuvestão Maio 2026</h1>
  </header>

  <img src="https://raw.githubusercontent.com/dilalves/simuladoaberto-site/main/resultadofuvestao0526/Digital---Simulado-Aberto-728X90.jpg"
       alt="Banner Simulado Aberto"
       style="display:block; margin:20px auto; max-width:728px; width:100%;">

  <div class="container">
    <h5 class="brand center">Simulado Fuvestão Maio 2026</h5>

    <!-- 🔍 Formulário de busca -->
    <div class="card z-depth-2" style="padding:20px;">
      <div class="row">
        <div class="input-field col s6">
          <input id="inscricao" type="text">
          <label for="inscricao">Inscrição</label>
        </div>
        <div class="input-field col s6">
          <input id="cpf" type="text">
          <label for="cpf">CPF</label>
        </div>
      </div>
      <div class="center">
        <button class="btn waves-effect blue darken-3" onclick="buscarResultado()">Consultar Resultado</button>
      </div>
    </div>

    <!-- 📄 Dados e gráfico -->
    <div id="dadosAluno" class="card white z-depth-1" style="display:none; padding:20px;"></div>

    <!-- 🧩 Tabela de respostas -->
    <table id="tblRespostas" class="striped centered responsive-table" style="display:none;">
      <thead>
        <tr>
          <th>Questão</th>
          <th>Resposta Aluno</th>
          <th>Gabarito</th>
          <th>Resolução</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

  <!-- Modal de Resolução -->
  <div id="modalResolucao" class="modal" style="max-width:95vw;">
    <div class="modal-content center-align" style="padding:10px 0;">
      <h6 class="brand" style="margin-bottom:10px;">Resolução da Questão</h6>
      <div id="areaResolucao" style="padding:0 10px;"></div>
    </div>
    <div class="modal-footer" style="text-align:right;">
      <a href="#!" class="modal-close btn-flat">Fechar</a>
    </div>
  </div>

    <div id="avisoMobile">
      ⚠️ Para visualizar as questões e resoluções completas,<br>
        acesse este resultado em um computador ou tablet.
    </div>

    <button id="btnTopo" onclick="window.scrollTo({top:0,behavior:'smooth'})">&#8593;</button>
  </div>

  <!-- ======================== SCRIPTS ======================== -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>

  <script>
  let chartDisciplinas = null;
  let chartDistribuicaoGeral = null;
  let chartDistribuicaoUnidade = null;

  // Inicializa Materialize
  document.addEventListener('DOMContentLoaded', async function() {
    const modals = document.querySelectorAll('.modal');
    M.Modal.init(modals);

    const liberado = await verificarLiberacaoResultado();

    if (!liberado) {
      window.location.href = 'resultado_indisponivel.html';
    }
  });

  //bloco para verificar se o resultado foi liberado antes de tentar buscar os dados do aluno
  async function verificarLiberacaoResultado() {
    try {
      const url = `https://apisec.secauxiliar.com.br/SIMULADOS/FUVESTAO0526/check_liberacao_resultado.php?evento=FUVESTAO0526`;

      const resp = await fetch(url);
      const dados = await resp.json();

      if (!dados.ok || !dados.liberado) {
        M.toast({
          html: dados.msg || 'Resultado ainda não disponível.',
          classes: 'red'
        });
        return false;
      }

      return true;

    } catch (e) {
      console.error(e);
      M.toast({
        html: 'Não foi possível verificar a liberação do resultado.',
        classes: 'red'
      });
      return false;
    }
  }



  function formatarPercentual(v) {
    const n = Number(v || 0);
    return n.toLocaleString('pt-BR', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
  }

  function atualizarTextoDistribuicao(id, dist) {
    const el = document.getElementById(id);
    if (!el || !dist) return;

    const pct = formatarPercentual(dist.percentual_melhores);
    const total = Number(dist.total_participantes || 0);

    el.innerHTML = `Você está classificado entre os <b>${pct}% melhores</b> neste grupo` +
      (total > 0 ? ` • ${total} participante${total === 1 ? '' : 's'}` : '');
  }

  const marcadorVocePlugin = {
    id: 'marcadorVocePlugin',
    afterDatasetsDraw(chart, args, pluginOptions) {
      const totalAluno = Number(pluginOptions.totalAluno);
      const xScale = chart.scales.x;
      const yScale = chart.scales.y;

      if (!xScale || !yScale || Number.isNaN(totalAluno)) return;

      const index = chart.data.labels.findIndex(v => Number(v) === totalAluno);
      if (index < 0) return;

      const ctx = chart.ctx;
      const x = xScale.getPixelForValue(index);
      const top = yScale.top;
      const bottom = yScale.bottom;

      ctx.save();
      ctx.beginPath();
      ctx.moveTo(x, top + 6);
      ctx.lineTo(x, bottom);
      ctx.lineWidth = 2;
      ctx.strokeStyle = '#002776';
      ctx.stroke();

      ctx.fillStyle = '#002776';
      ctx.font = 'bold 12px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('você', x, top + 14);

      ctx.beginPath();
      ctx.arc(x, bottom + 14, 13, 0, Math.PI * 2);
      ctx.fillStyle = '#f5c400';
      ctx.fill();
      ctx.lineWidth = 2;
      ctx.strokeStyle = '#002776';
      ctx.stroke();

      ctx.fillStyle = '#002776';
      ctx.font = 'bold 12px Arial';
      ctx.fillText(String(totalAluno), x, bottom + 18);
      ctx.restore();
    }
  };

  function criarGraficoDistribuicao(canvasId, dist, titulo) {
    const canvas = document.getElementById(canvasId);
    if (!canvas || !dist) return null;

    const labels = (dist.pontos || []).map(v => Number(v));
    const valores = (dist.qtds || []).map(v => Number(v));
    const totalAluno = Number(dist.total_aluno || 0);
    const maxQtd = Math.max(...valores, 1);

    return new Chart(canvas, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: 'Quantidade de alunos',
          data: valores,
          backgroundColor: labels.map(p => p === totalAluno ? '#002776' : '#8FC5F8'),
          borderColor: labels.map(p => p === totalAluno ? '#002776' : '#ffffff'),
          borderWidth: 1,
          barPercentage: 1,
          categoryPercentage: 1
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        layout: {
          padding: { bottom: 22, top: 8 }
        },
        plugins: {
          title: {
            display: false,
            text: titulo
          },
          legend: { display: false },
          tooltip: {
            callbacks: {
              title: itens => `${itens[0].label} acerto${Number(itens[0].label) === 1 ? '' : 's'}`,
              label: item => `${item.raw} aluno${Number(item.raw) === 1 ? '' : 's'}`
            }
          },
          datalabels: { display: false },
          marcadorVocePlugin: { totalAluno }
        },
        scales: {
          x: {
            title: {
              display: true,
              text: 'número de acertos',
              color: '#111',
              font: { size: 13 }
            },
            grid: { display: false },
            ticks: {
              color: '#111',
              autoSkip: false,
              maxRotation: 0,
              callback: function(value, index) {
                const label = Number(this.getLabelForValue(value));
                return label % 4 === 0 ? label : '';
              }
            }
          },
          y: {
            beginAtZero: true,
            suggestedMax: Math.ceil(maxQtd * 1.15),
            title: {
              display: true,
              text: 'número de pessoas',
              color: '#111',
              font: { size: 13 }
            },
            grid: { color: 'rgba(0,0,0,0.10)' },
            ticks: { color: '#111', precision: 0 }
          }
        }
      },
      plugins: [marcadorVocePlugin]
    });
  }
  // === CONSULTA RESULTADO ===
  async function buscarResultado() {

  const liberado = await verificarLiberacaoResultado();
  if (!liberado) return;

  const inscricao = document.getElementById("inscricao").value.trim();
  const cpf = document.getElementById("cpf").value.trim();
  const url = `https://apisec.secauxiliar.com.br/SIMULADOS/FUVESTAO0526/psq_resultado_fuv_0526.php?inscricao=${encodeURIComponent(inscricao)}&cpf=${encodeURIComponent(cpf)}`;


    try {
      const resp = await fetch(url);
      const dados = await resp.json();

      if (!dados.ok) {
        M.toast({html: dados.msg, classes: 'red'});
        return;
      }

      const aluno = dados.aluno;
      const respostas = dados.respostas;
      const dadosAluno = document.getElementById('dadosAluno');
      const tabela = document.getElementById('tblRespostas');
      const tbody = tabela.querySelector('tbody');

      dadosAluno.innerHTML = `
        <h6><b>${aluno.Nome}</b> • ${aluno.Nome_Unidade}</h6>
        <p>Inscrição: ${aluno.INSCRICAO} | CPF: ${aluno.CPF}</p>
        <p><b>Acertos:</b> ${dados.acertos}/${dados.total} (${dados.percentual}%)</p>
        <table class="highlight centered">
          <thead>
            <tr><th colspan="13">Desempenho nas Áreas</th></tr>
            <tr>
              <th>POR</th><th>HIS</th><th>ING</th><th>SOC</th>
              <th>BIO</th><th>QUI</th><th>FIL</th><th>FIS</th>
              <th>MAT</th><th>GEO</th><th>TOTAL</th><th>CLS_G</th><th>CLS_U</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>${aluno.POR}</td><td>${aluno.HIS}</td><td>${aluno.ING}</td><td>${aluno.SOC}</td>
              <td>${aluno.BIO}</td><td>${aluno.QUI}</td><td>${aluno.FIL}</td><td>${aluno.FIS}</td>
              <td>${aluno.MAT}</td><td>${aluno.GEO}</td><td><b>${aluno.TOTAL}</b></td>
              <td>${aluno.CLS_G}</td><td>${aluno.CLS_U}</td>
            </tr>
          </tbody>
        </table>

        <div class="graficos-posicao">
          <div class="grafico-posicao-card">
            <div class="grafico-posicao-topo">
              <div>
                <h6>Comparação com todos os participantes</h6>
                <p id="txtDistGeral">Análise de seu desempenho em relação a todos os presentes.</p>
              </div>
              <div class="badge-pontos">
                <strong>${aluno.TOTAL}</strong>
                <span>pontos</span>
              </div>
            </div>
            <div class="grafico-posicao-corpo">
              <div class="grafico-posicao-texto">
                desempenho em relação a todos os presentes na aplicação do exame
              </div>
              <div class="grafico-posicao-canvas-wrap">
                <canvas id="graficoDistribuicaoGeral"></canvas>
              </div>
            </div>
          </div>

          <div class="grafico-posicao-card">
            <div class="grafico-posicao-topo">
              <div>
                <h6>Comparação com a unidade</h6>
                <p id="txtDistUnidade">Análise de seu desempenho em relação aos presentes da sua unidade.</p>
              </div>
              <div class="badge-pontos">
                <strong>${aluno.TOTAL}</strong>
                <span>pontos</span>
              </div>
            </div>
            <div class="grafico-posicao-corpo">
              <div class="grafico-posicao-texto">
                desempenho em relação aos participantes da unidade ${aluno.Nome_Unidade}
              </div>
              <div class="grafico-posicao-canvas-wrap">
                <canvas id="graficoDistribuicaoUnidade"></canvas>
              </div>
            </div>
          </div>
        </div>

        <div id="chartWrap">
          <canvas id="graficoDesempenho" style="width:100%;max-width:1000px;margin:30px auto;display:block;"></canvas>
        </div>
      `;
      
      dadosAluno.style.display = 'block';

      tbody.innerHTML = respostas.map(r => {
        const acertou = r.ACERTOU == 1;
        const classe  = acertou ? 'acerto' : 'erro';
        const icone = acertou 
          ? '<span style="color:green;font-weight:bold;font-size:18px;">&#10004;</span>' 
          : `<button class="btn-small blue lighten-1" onclick='abrirModalResolucao(${JSON.stringify(r.LINK || "")})'>Ver resolução</button>`;
          return `
          <tr class="${classe}">
            <td>${r.QUESTAO_ALUNO}</td>
            <td>${r.RESPOSTA_ALUNO || '-'}</td>
            <td>${r.GABARITO_CORRETO}</td>
            <td>${icone}</td>
          </tr>
        `;
      }).join('');


      

      // === GRÁFICOS DE POSIÇÃO ESTILO FUVEST ===
      if (chartDistribuicaoGeral) chartDistribuicaoGeral.destroy();
      if (chartDistribuicaoUnidade) chartDistribuicaoUnidade.destroy();
      if (chartDisciplinas) chartDisciplinas.destroy();

      atualizarTextoDistribuicao('txtDistGeral', dados.distribuicao_geral);
      atualizarTextoDistribuicao('txtDistUnidade', dados.distribuicao_unidade);

      chartDistribuicaoGeral = criarGraficoDistribuicao(
        'graficoDistribuicaoGeral',
        dados.distribuicao_geral,
        'Comparação com todos os participantes'
      );

      chartDistribuicaoUnidade = criarGraficoDistribuicao(
        'graficoDistribuicaoUnidade',
        dados.distribuicao_unidade,
        'Comparação com a unidade'
      );

      // === GRÁFICO COMPARATIVO POR DISCIPLINA ===
      const ctx = document.getElementById('graficoDesempenho');
      if (ctx) {
        const disciplinas = ['POR','HIS','ING','SOC','BIO','QUI','FIL','FIS','MAT','GEO'];
        const notasAluno  = disciplinas.map(d => parseFloat(aluno[d]));
        const medias      = disciplinas.map(d => parseFloat(dados.media_geral[d]));

        chartDisciplinas = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: disciplinas,
            datasets: [
              { 
                label: 'Aluno', 
                data: notasAluno, 
                backgroundColor: '#1A4F8B',  //'#1E5AA8'
                borderColor: '#1E5AA8',
                borderWidth: 1,
                borderColor: '#ffffff'
              },
              { 
                label: 'Média Geral', 
                data: medias, 
                backgroundColor: '#C9D1D9',  //'#B8C2CC'
                borderColor: '#B8C2CC',
                borderWidth: 1,
                borderColor: '#ffffff'   //inserido para destacar as barras da média geral
              }
            ]
          },
          options: {
            responsive: true,
            plugins: {
              title: { display: true, text: 'Comparativo por Disciplina', font: { size: 18 } },
              legend: { position: 'bottom' },
              tooltip: { enabled: true },
              datalabels: { 
                color: '#000',
                anchor: 'end',
                align: 'end',
                offset: 4,
                font: { 
                  weight: 'bold', 
                  size: 12 
                },
                formatter: function(value) {
                  return value > 0 ? value : '';
                }
              }
            },
            scales: { 
              y: { 
                beginAtZero: true, 
                max: 22, 
                ticks: { stepSize: 2 } 
              } 
            }
          },
          plugins: [ChartDataLabels]
        });
      }

      tabela.style.display = 'table';
    } catch (e) {
      console.error(e);
      M.toast({html:'Erro ao consultar resultado', classes:'red'});
    }
  }

  // === ABRIR MODAL DE RESOLUÇÃO ===
function abrirModalResolucao(link) {
  if (!link) {
    M.toast({html:'Resolução não disponível.', classes:'orange'});
    return;
  }

  const modal = document.getElementById('modalResolucao');
  const area = document.getElementById('areaResolucao');
  if (!modal || !area) return;

  area.innerHTML = `<p style="color:#666;">Carregando resolução...</p>`;

  const oldInstance = M.Modal.getInstance(modal);
  if (oldInstance) oldInstance.destroy();

  const instance = M.Modal.init(modal, {
    preventScrolling: true,
    dismissible: true,
    opacity: 0.6
  });

  const imgTeste = new Image();

  imgTeste.onload = () => {
    area.innerHTML = `
      <div style="
        display:flex;
        justify-content:center;
        align-items:flex-start;
        overflow-y:auto;
        overflow-x:hidden;
        max-height: calc(90vh - 10px);
        padding:10px 0 100px;
        margin:0 auto;
        scrollbar-width:thin;
      ">
        <img src="${link}" alt="Resolução"
          style="
            width:100%;
            max-width:900px;
            height:auto;
            border-radius:10px;
            box-shadow:0 0 12px rgba(0,0,0,0.25);
            display:block;
          ">
      </div>
    `;
  };

  imgTeste.onerror = () => {
    area.innerHTML = `
      <p style="color:#b71c1c;padding:20px;">
        Não foi possível carregar a resolução.
      </p>
      <p>
        <a href="${link}" target="_blank" class="btn blue darken-3">
          Abrir em nova aba
        </a>
      </p>
    `;
  };

  imgTeste.src = link;
  instance.open();
}

  // === BOTÃO VOLTAR AO TOPO ===
  window.addEventListener("scroll", () => {
    const btn = document.getElementById("btnTopo");
    btn.style.display = (window.scrollY > 500) ? 'block' : 'none';
  });
  </script>
</body>
</html>
